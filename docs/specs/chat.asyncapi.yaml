asyncapi: 2.6.0
info:
  title: Chat Stream
  version: "1.0.0"
channels:
  chat.send:
    publish:
      message:
        payload:
          type: object
          required: [room, text]
          properties:
            room:
              type: string
            text:
              type: string
    subscribe:
      message:
        example:
          ok: true
          event: message.accepted
  metric.push:
    publish:
      message:
        payload:
          type: object
          required: [metric, value]
          properties:
            metric:
              type: string
            value:
              type: number
    subscribe:
      message:
        payload:
          type: object
          required: [accepted]
          properties:
            accepted:
              type: boolean
