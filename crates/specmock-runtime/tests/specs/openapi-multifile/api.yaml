openapi: "3.1.0"
info:
  title: Multi-file Pets API
  version: "1.0.0"
paths:
  /pets/{id}:
    get:
      operationId: getPet
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: A single pet
          content:
            application/json:
              schema:
                $ref: './schemas/pet.yaml#/Pet'
