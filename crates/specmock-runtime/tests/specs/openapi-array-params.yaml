openapi: 3.1.0
info:
  title: Array Query Params API
  version: "1.0.0"
paths:
  /search:
    get:
      operationId: searchByTags
      parameters:
        - in: query
          name: tag
          required: true
          schema:
            type: array
            items:
              type: string
            minItems: 1
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required: [name, tags]
                  properties:
                    name:
                      type: string
                    tags:
                      type: array
                      items:
                        type: string
